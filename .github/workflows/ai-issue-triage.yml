name: AI Issue Triage

# STAGE 1 of the AI pipeline:
#   triage (this) -> ai-fix -> ai-pr-review <-> ai-apply-review -> completion comment
#
# Trigger: a human adds the `ai-to-investigate` label to an issue.
# Output:  one investigation comment ending in a machine-readable verdict
#          marker; on verdict `fix` this workflow dispatches AI Fix.
#
# All chaining in this pipeline uses explicit `gh workflow run`
# (workflow_dispatch). Side effects performed with GITHUB_TOKEN — labels,
# comments, pushed commits, created PRs — do NOT emit events that trigger
# other workflows, so label- or comment-based chaining would silently never
# fire. workflow_dispatch is the documented exception to that rule.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  actions: write # to dispatch the AI Fix workflow

concurrency:
  group: ai-issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  investigate:
    # Don't react to issues opened by bots (including our own automation).
    if: ${{ !endsWith(github.event.issue.user.login, '[bot]') && github.event.label.name == 'ai-to-investigate' }}
    runs-on: [self-hosted, ai]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Investigate issue with Claude
        uses: anthropics/claude-code-action@v1
        env:
          # The runner is already an isolated Docker container; the action's
          # bubblewrap sandbox can't work here (read-only /proc/sys), so opt out.
          CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "0"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_BASE_SUB_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            You are investigating GitHub issue #${{ github.event.issue.number }}
            in repository ${{ github.repository }}.

            Issue title: ${{ github.event.issue.title }}

            Read the full issue body first:
              gh issue view ${{ github.event.issue.number }} --json title,body,labels

            Then investigate the codebase (this is a Rust CLI project; you may
            run `cargo build`, `cargo test`, `cargo run -- ...` to reproduce).

            Your job is ANALYSIS ONLY — do not modify any TRACKED repository
            files, do not create branches or PRs.

            When done, write the comment body to a scratch file named
            .ai-triage-comment.md in the repository root using the Write
            tool (this workflow never commits, so the file is never persisted
            — it only exists to pass text to gh), then post exactly one
            comment on the issue via:
              gh issue comment ${{ github.event.issue.number }} --body-file .ai-triage-comment.md

            Write the comment in English. It must be structured as:
            ## 🔍 AI Investigation
            - **Symptom** — what the issue describes, in one or two sentences.
            - **Root cause** — the concrete cause, with file paths and line
              references (e.g. `src/main.rs:42`). If you could not determine it
              with confidence, say so honestly and list hypotheses instead.
            - **Reproduction** — how you reproduced it (or why you couldn't).
            - **Suggested fix** — a short plan of the change needed.
            - **Complexity** — trivial / small / medium / large.
            - If your verdict (below) is `fix`, end the text with:
              "_Implementation will start automatically — a pull request will
              follow._"
              Otherwise end with: "_No automated fix will be attempted. Add the
              `ai-fix` label to force an implementation attempt._"

            The VERY LAST line of the comment must be exactly one
            machine-readable verdict marker (invisible in rendered Markdown;
            the pipeline parses it to decide whether to start the fix stage):
              <!-- ai-triage-verdict: fix -->
                use when you identified a concrete, actionable code fix with
                reasonable confidence
              <!-- ai-triage-verdict: no-fix -->
                use when it is not a code bug, needs more info from the
                reporter, or the root cause stayed unclear

            After posting the comment, add the label:
              gh issue edit ${{ github.event.issue.number }} --add-label "ai-investigated"
          claude_args: |
            --allowedTools "Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(cargo:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*),Read,Grep,Glob,Write"

      - name: Dispatch AI Fix on `fix` verdict
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          verdict=$(gh issue view "$ISSUE" --repo "$REPO" --json comments \
            --jq '[.comments[] | select((.author.login | startswith("github-actions")) and (.body | contains("<!-- ai-triage-verdict:")))] | last | .body // ""' \
            | grep -oE 'ai-triage-verdict: *(fix|no-fix)' | tail -1 | awk '{print $2}' || true)
          echo "Triage verdict: '${verdict:-none}'"
          if [[ "$verdict" == "fix" ]]; then
            # The label is added for visibility only — bot-added labels emit no
            # events, so the dispatch below is what actually starts the stage.
            gh issue edit "$ISSUE" --repo "$REPO" --add-label "ai-fix"
            gh workflow run ai-fix.yml --repo "$REPO" -f issue_number="$ISSUE"
            echo "Dispatched AI Fix for issue #$ISSUE."
          else
            echo "No fix verdict — the pipeline stops after the investigation."
          fi
